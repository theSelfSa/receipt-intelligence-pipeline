services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/receipts
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: 10
      LOW_OCR_THRESHOLD: 0.65
      MEDIUM_CONFIDENCE_THRESHOLD: 0.65
      HIGH_CONFIDENCE_THRESHOLD: 0.85
      RETRAINING_CORRECTION_THRESHOLD: 500
      ANALYSIS_MIN_CORRECTIONS: 5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/receipts
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: 10
      LOW_OCR_THRESHOLD: 0.65
      MEDIUM_CONFIDENCE_THRESHOLD: 0.65
      HIGH_CONFIDENCE_THRESHOLD: 0.85
      RETRAINING_CORRECTION_THRESHOLD: 500
      ANALYSIS_MIN_CORRECTIONS: 5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads

  beat:
    build: .
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@db:5432/receipts
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: 10
      LOW_OCR_THRESHOLD: 0.65
      MEDIUM_CONFIDENCE_THRESHOLD: 0.65
      HIGH_CONFIDENCE_THRESHOLD: 0.85
      RETRAINING_CORRECTION_THRESHOLD: 500
      ANALYSIS_MIN_CORRECTIONS: 5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./uploads:/app/uploads

  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: receipts
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d receipts"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
